<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plane WorkItem Analyzer</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>

<body>
  <header class="topbar">
    <div class="title">Plane WorkItem Analyzer</div>
    <div id="meta" class="meta">未识别 Plane 链接</div>
  </header>

  <section class="controls">
    <label class="row">
      <span>后端地址</span>
      <input id="serverUrl" type="text" value="http://127.0.0.1:8787" />
    </label>
    <button id="analyzeBtn" disabled>开始分析</button>
    <button id="stopBtn" disabled>停止</button>
  </section>

  <section id="issueCard" class="issue-card hidden">
    <div class="issue-title" id="issueTitle"></div>
    <div class="issue-sub">
      <span id="issueState"></span>
      <span id="issueLabels"></span>
    </div>
    <a id="issueLink" target="_blank" rel="noreferrer"></a>
  </section>

  <section class="status" id="status"></section>

  <nav class="tabs">
    <button class="tab active" data-tab="process">过程日志</button>
    <button class="tab" data-tab="result">分析结果</button>
  </nav>

  <main id="process" class="pane pane-process active"></main>
  <main id="output" class="pane pane-result"></main>

  <script src="sidepanel.js"></script>
</body>

</html>
